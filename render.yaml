services:
  - type: web
    name: admitscope-backend
    env: python
    runtime: python-3.11.8
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python models/train_all.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONDONTWRITEBYTECODE
        value: 1
